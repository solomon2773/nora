name: Nora CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend-api/package-lock.json
      - run: npm ci
      - run: npm test

